# App auditapp — Dokploy (desplegar DESPUÉS del proyecto db)
#
# 1. Crear app "Docker Compose" en Dokploy → compose: deploy/dokploy-app.compose.yml
# 2. Variables: deploy/app.env.example (misma POSTGRES_PASSWORD que db)
# 3. Dominio en UI Dokploy → app.auditoriaserviciosysistemas.com.ar, puerto interno 3033
# 4. Deploy → entrypoint: migraciones → seed si vacío → node build/index.js
#
# No configurar DATABASE_URL ni PORT en Dokploy (el entrypoint arma la URL desde POSTGRES_PASSWORD).

name: auditapp-app

services:
  app:
    build:
      context: ..
      dockerfile: Dockerfile
    environment:
      POSTGRES_HOST: auditapp-postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      SESSION_SECRET: ${SESSION_SECRET}
      PUBLIC_APP_URL: ${PUBLIC_APP_URL:-https://app.auditoriaserviciosysistemas.com.ar}
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY}
      R2_BUCKET: ${R2_BUCKET:-auditapp}
      R2_ENDPOINT: ${R2_ENDPOINT}
      R2_PUBLIC_BASE_URL: ${R2_PUBLIC_BASE_URL:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      INFORME_CLAUDE_MODEL: ${INFORME_CLAUDE_MODEL:-}
      INFORME_GENERATION_TIMEOUT_MS: ${INFORME_GENERATION_TIMEOUT_MS:-}
      # Asistente de reunión (#12) — STT Whisper + extracción LLM (OpenAI)
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      REUNION_PIPELINE_MODE: ${REUNION_PIPELINE_MODE:-direct}
      REUNION_STT_PROVIDER: ${REUNION_STT_PROVIDER:-openai}
      REUNION_LLM_MODEL: ${REUNION_LLM_MODEL:-gpt-4o-mini}
      REUNION_MAX_AUDIO_BYTES: ${REUNION_MAX_AUDIO_BYTES:-104857600}
      REUNION_AUDIO_RETENTION_DAYS: ${REUNION_AUDIO_RETENTION_DAYS:-365}
      # Subido a 120M para audio de reunión (debe ser >= REUNION_MAX_AUDIO_BYTES)
      BODY_SIZE_LIMIT: ${BODY_SIZE_LIMIT:-120M}
      AUTO_SEED: ${AUTO_SEED:-true}
      PORT: '3033'
    networks:
      - dokploy-network
    healthcheck:
      test:
        [
          'CMD-SHELL',
          "node -e \"fetch('http://127.0.0.1:'+(process.env.PORT||3033)+'/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 120s
    restart: unless-stopped

networks:
  dokploy-network:
    external: true
    name: dokploy-network
