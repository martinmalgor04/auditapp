# deploy/dokploy.compose.example.yml — TODO-EN-UNO (alternativa)
# Recomendado en producción: dos apps Dokploy separadas (como presupuestossys):
#   deploy/dokploy-db.compose.yml  → proyecto Dokploy db (primero)
#   deploy/dokploy-app.compose.yml → proyecto Dokploy app (después)
#
# Dominio/HTTPS: UI Dokploy, servicio app, puerto interno 3033.
# Postgres admin: puerto host 4043 (bind 127.0.0.1 por defecto; túnel SSH o POSTGRES_PUBLISH_BIND).
services:
  postgres:
    build:
      context: ..
      dockerfile: docker/postgres/Dockerfile
    environment:
      POSTGRES_USER: auditapp
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: auditapp
      POSTGRES_ALLOWED_CIDRS: ${POSTGRES_ALLOWED_CIDRS:-}
    volumes:
      - auditapp_pgdata:/var/lib/postgresql/data
    ports:
      - '${POSTGRES_PUBLISH_BIND:-127.0.0.1}:4043:5432'
    networks:
      - db
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U auditapp -d auditapp']
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  app:
    build:
      context: ..
      dockerfile: Dockerfile
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      SESSION_SECRET: ${SESSION_SECRET}
      PUBLIC_APP_URL: https://app.auditoriaserviciosysistemas.com.ar
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY}
      R2_BUCKET: ${R2_BUCKET}
      R2_ENDPOINT: ${R2_ENDPOINT}
      PORT: '3033'
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - db
      - dokploy
    restart: unless-stopped

networks:
  db:
    internal: true
  dokploy:
    external: true
    name: dokploy-network

volumes:
  auditapp_pgdata:
